<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Divya Luxury Seafoods — Premium Imported Seafood, Delhi NCR</title>
    <meta name="description" content="Delhi NCR's finest imported seafood — Salmon, Prawns, Tuna, Lobster & more. Same-day delivery across Delhi, Gurgaon, Noida & Greater Noida." />
    <meta name="theme-color" content="#0B1D2A" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Divya Luxury Seafoods" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-192.png" />

    <!-- Open Graph (WhatsApp / Facebook link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Divya Luxury Seafoods" />
    <meta property="og:title" content="Divya Luxury Seafoods — Premium Imported Seafood" />
    <meta property="og:description" content="Delhi NCR's finest imported seafood. Same-day delivery to Delhi, Gurgaon, Noida & Greater Noida." />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- Preconnect: API + image CDN -->
    <link rel="preconnect" href="https://divya-foods-api-production-9380.up.railway.app" />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
