name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          # DEBUG defaults to False, which activates the production JWT secret
          # check in app/config.py — give it a real (non-placeholder, 32+ char)
          # value here since no backend/.env exists in CI. Everything else
          # (Mongo URL, Razorpay secret) already has a working default the
          # test suite is written to use as-is.
          JWT_SECRET_KEY: ci-test-secret-key-only-not-for-production-use
        run: pytest -q

      - name: Dependency vulnerability scan (report only)
        # continue-on-error: known CVEs currently exist (fastapi/starlette are
        # 27 minor versions behind, among others) that need a dedicated,
        # tested upgrade pass rather than silently failing every build until
        # then. This still surfaces results in the step's log/annotations —
        # it just doesn't block merges yet.
        continue-on-error: true
        run: |
          pip install pip-audit -q
          pip-audit -r requirements.txt

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

      - name: Dependency vulnerability scan (report only)
        # continue-on-error: esbuild/vite currently carry a known dev-server-only
        # advisory with no non-breaking fix (only resolved by a Vite 5->8 major
        # bump). Report it without blocking merges until that upgrade is planned.
        continue-on-error: true
        run: npm audit --audit-level=high
